<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strudel AI</title>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #17171f;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e2e0f0;
      --muted: #6b6880;
      --code-bg: #12121a;
      --user-bubble: #1e1e2e;
      --assistant-bubble: #1a1a26;
      --green: #4ade80;
      --red: #f87171;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* ── Chat Panel ── */
    #chat-panel {
      display: flex;
      flex-direction: column;
      width: 38%;
      min-width: 320px;
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    #panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
    }

    #panel-header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--accent2);
    }

    #panel-header .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    /* Config section */
    #config {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface2);
    }

    .config-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    select, input[type="text"], input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    select:focus, input:focus {
      border-color: var(--accent);
    }

    select { cursor: pointer; }

    #provider-select { width: 120px; flex-shrink: 0; }
    #model-input { flex: 1; }
    #api-key-input { flex: 1; font-family: monospace; font-size: 11px; }

    .key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .key-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    #key-status {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #key-status.ok { background: var(--green); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-role {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 2px;
    }

    .message.user .message-role { color: var(--accent); }
    .message.assistant .message-role { color: var(--accent2); }

    .message-body {
      background: var(--user-bubble);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.55;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .message.assistant .message-body {
      background: var(--assistant-bubble);
    }

    /* Code blocks inside messages */
    .message-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0 4px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 11.5px;
      line-height: 1.6;
      color: #c4b5fd;
    }

    .message-body code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11.5px;
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
      color: #c4b5fd;
    }

    .message-body pre code {
      background: none;
      padding: 0;
    }

    .message-body p { margin-bottom: 6px; }
    .message-body p:last-child { margin-bottom: 0; }

    /* Apply button on assistant messages */
    .apply-btn {
      align-self: flex-start;
      margin-top: 4px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, opacity 0.15s;
    }

    .apply-btn:hover { background: var(--accent2); }
    .apply-btn:disabled { opacity: 0.5; cursor: default; }

    .apply-btn .icon { font-size: 11px; }

    /* Thinking indicator */
    .thinking {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 12px;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    /* Input area */
    #input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
    }

    #user-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 60px;
      max-height: 160px;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    .input-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover { background: var(--accent2); }
    #send-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Strudel Panel ── */
    #strudel-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #strudel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
    }

    #strudel-status {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    #strudel-status.loaded { background: var(--green); }

    #strudel-url {
      font-family: monospace;
      font-size: 10px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 400px;
    }

    #strudel-frame {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    #empty-state .big { font-size: 40px; }
    #empty-state h2 { font-size: 16px; color: var(--text); font-weight: 500; }
    #empty-state p { font-size: 13px; line-height: 1.6; max-width: 300px; }

    .example-prompts {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      width: 100%;
      max-width: 340px;
    }

    .example-prompt {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }

    .example-prompt:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .error-msg {
      background: #2a1a1a;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--red);
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── LEFT: Chat Panel ── -->
  <div id="chat-panel">
    <div id="panel-header">
      <h1>⟡ Strudel AI</h1>
      <span class="subtitle">describe → generate → play</span>
    </div>

    <div id="config">
      <div class="config-row">
        <select id="provider-select">
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter (Claude/GPT/etc)</option>
          <option value="openai-compat">Custom (OpenAI-compat)</option>
        </select>
        <input type="text" id="model-input" placeholder="Model" value="gpt-4o" />
      </div>
      <div class="key-row">
        <span class="key-label">API Key</span>
        <input type="password" id="api-key-input" placeholder="sk-..." />
        <div id="key-status" title="No key set"></div>
      </div>
      <div id="base-url-row" class="config-row" style="display:none">
        <input type="text" id="base-url-input" placeholder="Base URL (e.g. http://localhost:11434/v1)" style="flex:1" />
      </div>
    </div>

    <div id="messages">
      <div id="empty-state">
        <div class="big">🎛</div>
        <h2>What should it sound like?</h2>
        <p>Describe the vibe, genre, tempo, or mood and the AI will write Strudel code for you.</p>
        <div class="example-prompts">
          <button class="example-prompt" onclick="fillPrompt(this)">Dark acid techno, 138bpm, heavy sub bass</button>
          <button class="example-prompt" onclick="fillPrompt(this)">Dreamy lo-fi hip hop with Rhodes and rain sounds</button>
          <button class="example-prompt" onclick="fillPrompt(this)">Glitchy IDM, broken beats, metallic textures</button>
          <button class="example-prompt" onclick="fillPrompt(this)">Minimal dub techno, 126bpm, dubby chords, sparse kicks</button>
          <button class="example-prompt" onclick="fillPrompt(this)">Ambient drone with slow evolving pads, no drums</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" placeholder="Describe the sound you want…" rows="2"></textarea>
      <div class="input-row">
        <span class="input-hint">Shift+Enter for new line · Enter to send</span>
        <button id="send-btn" onclick="sendMessage()">Generate</button>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Strudel Panel ── -->
  <div id="strudel-panel">
    <div id="strudel-header">
      <div id="strudel-status" title="No code loaded"></div>
      <span>strudel.cc</span>
      <span id="strudel-url"></span>
    </div>
    <iframe
      id="strudel-frame"
      src="https://strudel.cc"
      allow="autoplay; microphone"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
    ></iframe>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  history: [],          // full conversation history for the LLM
  lastCode: null,       // last extracted Strudel code
  loading: false,
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const messagesEl    = document.getElementById('messages');
const userInputEl   = document.getElementById('user-input');
const sendBtnEl     = document.getElementById('send-btn');
const apiKeyEl      = document.getElementById('api-key-input');
const modelEl       = document.getElementById('model-input');
const providerEl    = document.getElementById('provider-select');
const baseUrlRowEl  = document.getElementById('base-url-row');
const baseUrlEl     = document.getElementById('base-url-input');
const keyStatusEl   = document.getElementById('key-status');
const strudelFrame  = document.getElementById('strudel-frame');
const strudelStatus = document.getElementById('strudel-status');
const strudelUrlEl  = document.getElementById('strudel-url');
const emptyState    = document.getElementById('empty-state');

// ── Persistence ────────────────────────────────────────────────────────────
const LS = {
  get: (k, d) => { try { return localStorage.getItem(k) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch {} },
};

function loadSettings() {
  apiKeyEl.value  = LS.get('sai_key', '');
  modelEl.value   = LS.get('sai_model', 'gpt-4o');
  providerEl.value = LS.get('sai_provider', 'openai');
  baseUrlEl.value = LS.get('sai_base_url', '');
  updateKeyStatus();
  toggleBaseUrl();
}

function saveSettings() {
  LS.set('sai_key',      apiKeyEl.value.replace(/\s+/g, ''));
  LS.set('sai_model',    modelEl.value.trim());
  LS.set('sai_provider', providerEl.value);
  LS.set('sai_base_url', baseUrlEl.value.trim());
  updateKeyStatus();
}

function updateKeyStatus() {
  const ok = apiKeyEl.value.trim().length > 4;
  keyStatusEl.className = ok ? 'ok' : '';
  keyStatusEl.title = ok ? 'API key set' : 'No API key';
}

// Default models per provider
const PROVIDER_DEFAULTS = {
  openai: 'gpt-4o',
  openrouter: 'anthropic/claude-sonnet-4-6',
  'openai-compat': '',
};

function toggleBaseUrl() {
  baseUrlRowEl.style.display = providerEl.value === 'openai-compat' ? 'flex' : 'none';
}

apiKeyEl.addEventListener('input', saveSettings);
modelEl.addEventListener('input', saveSettings);
providerEl.addEventListener('change', () => {
  // Auto-fill default model for the chosen provider
  const def = PROVIDER_DEFAULTS[providerEl.value];
  if (def) modelEl.value = def;
  saveSettings();
  toggleBaseUrl();
});
baseUrlEl.addEventListener('input', saveSettings);

// ── System Prompt ──────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a Strudel live coding assistant. Strudel is a browser-based live coding music environment based on TidalCycles.

When the user describes a sound, vibe, or musical idea, respond with working Strudel code.

## Strudel Syntax Reference

### Basic sounds
\`\`\`js
s("bd sd hh sd")               // samples: bd=kick, sd=snare, hh=hihat, oh=open hat, cp=clap, rim=rimshot
s("hh*8")                      // repeat 8 times per cycle
s("bd*2 sd [hh hh] sd")        // subdivision with []
s("bd(3,8)")                   // Euclidean rhythm: 3 hits over 8 steps
s("hh:0 hh:2 hh:4")           // sample index variation with :
\`\`\`

### Notes and melody
\`\`\`js
note("c3 e3 g3 b3").sound("piano")
note("<c3 eb3 g3> <f3 ab3>").sound("piano").slow(2)
note("c2 ~ c2 ~").sound("bass")  // ~ = rest
\`\`\`

### Mini-notation patterns
\`\`\`js
"c3 [e3 g3] b3"    // [] = subdivide step
"c3 <e3 g3>"       // <> = alternate each cycle
"c3 e3*2"          // *2 = repeat
"c3 e3?"           // ? = random chance
\`\`\`

### Stacking layers
\`\`\`js
stack(
  s("bd sd bd sd"),
  s("hh*8").gain(0.4),
  note("c2 ~ eb2 ~").sound("bass").lpf(400)
)
\`\`\`

### Effects
\`\`\`js
.room(0.4)         // reverb (0-1)
.delay(0.25)       // delay
.delaytime(0.33)   // delay time
.delayfeedback(0.5)
.lpf(800)          // low-pass filter (Hz)
.hpf(200)          // high-pass filter (Hz)
.gain(0.7)         // volume (0-1+)
.pan(-0.5)         // stereo pan (-1 to 1)
.vowel("a e i")    // vowel filter
.crush(4)          // bit crush
.speed(0.8)        // sample playback speed / pitch
.begin(0.1).end(0.9)  // sample start/end
\`\`\`

### Tempo
\`\`\`js
setcps(140/60/4)   // set BPM: bpm / 60 / 4 = cycles per second
\`\`\`

### Pattern transformations
\`\`\`js
.fast(2)           // double speed
.slow(2)           // half speed
.rev()             // reverse
.jux(rev)          // jux: apply fn to right channel only
.every(4, fast(2)) // every 4 cycles, apply fast(2)
.sometimes(x => x.room(0.8))
.rarely(x => x.speed(0.5))
.degradeBy(0.2)    // randomly drop 20% of events
\`\`\`

### Chord/scale helpers
\`\`\`js
note("0 2 4 7").scale("C:minor").sound("piano")
chord("<Cm7 Fm7 Gm7>").voicing().sound("piano")
\`\`\`

### Available sample banks
Common: bd, sd, hh, oh, cp, rim, bass, bass2, bass3, bd, sd, feel, jazz, tabla, east, moog, amencutup, amen, breaks165, reese, diphone2, sitar, gtr, casio, mouth, noise, breath, metal, realclaps, latibro, psr, odx

## Rules
1. Always output a single fenced code block with the complete Strudel pattern.
2. Code must be valid Strudel JavaScript — no imports, no module syntax. It runs directly.
3. Aim for musicality: use variation, dynamics (gain), and some effects.
4. Match the BPM/energy to what the user describes.
5. After the code block, briefly explain what you made (2-3 sentences max).
6. When the user asks to adjust or modify, output the full revised code block.`;

// ── Strudel ────────────────────────────────────────────────────────────────
function encodeForStrudel(code) {
  // LZ-string compression, same as strudel.cc uses for share URLs
  return LZString.compressToEncodedURIComponent(code);
}

function applyToStrudel(code) {
  const encoded = encodeForStrudel(code);
  const url = `https://strudel.cc/#${encoded}`;
  strudelFrame.src = url;
  strudelStatus.className = 'loaded';
  strudelUrlEl.textContent = code.split('\n')[0].trim().slice(0, 60) + '…';
  state.lastCode = code;
}

// ── Message rendering ──────────────────────────────────────────────────────
function hideEmptyState() {
  if (emptyState) emptyState.style.display = 'none';
}

function renderMessage(role, content, code) {
  hideEmptyState();
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const roleEl = document.createElement('div');
  roleEl.className = 'message-role';
  roleEl.textContent = role === 'user' ? 'You' : 'Strudel AI';

  const bodyEl = document.createElement('div');
  bodyEl.className = 'message-body';
  bodyEl.innerHTML = formatContent(content);

  wrap.appendChild(roleEl);
  wrap.appendChild(bodyEl);

  if (role === 'assistant' && code) {
    const btn = document.createElement('button');
    btn.className = 'apply-btn';
    btn.innerHTML = '<span class="icon">▶</span> Apply to Strudel';
    btn.onclick = () => applyToStrudel(code);
    wrap.appendChild(btn);
  }

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function renderError(msg) {
  hideEmptyState();
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';
  const roleEl = document.createElement('div');
  roleEl.className = 'message-role';
  roleEl.textContent = 'Error';
  const bodyEl = document.createElement('div');
  bodyEl.className = 'error-msg';
  bodyEl.textContent = msg;
  wrap.appendChild(roleEl);
  wrap.appendChild(bodyEl);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderThinking() {
  hideEmptyState();
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';
  const roleEl = document.createElement('div');
  roleEl.className = 'message-role';
  roleEl.textContent = 'Strudel AI';
  const thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:4px">Generating…</span>';
  wrap.appendChild(roleEl);
  wrap.appendChild(thinkEl);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

// Simple markdown-ish formatter: handles ```code``` blocks and inline `code`
function formatContent(text) {
  // Code fences
  text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
    return `<pre><code>${escHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
  // Paragraphs (double newline)
  const paras = text.split(/\n{2,}/);
  return paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Code extraction ────────────────────────────────────────────────────────
function extractCode(text) {
  // Prefer JS/strudel fenced block, fall back to any fenced block
  const fenced = text.match(/```(?:js|javascript|strudel)?\n?([\s\S]+?)```/);
  if (fenced) return fenced[1].trim();
  return null;
}

// ── LLM API ───────────────────────────────────────────────────────────────
async function callLLM(messages) {
  const key      = apiKeyEl.value.replace(/\s+/g, '');
  const model    = modelEl.value.trim() || PROVIDER_DEFAULTS[providerEl.value] || 'gpt-4o';
  const provider = providerEl.value;

  if (!key) throw new Error('No API key set. Enter your key in the config above.');

  // ── OpenAI / OpenRouter / OpenAI-compatible ────────────────────────────
  let url;
  if (provider === 'openrouter') {
    url = 'https://openrouter.ai/api/v1/chat/completions';
  } else if (provider === 'openai-compat') {
    const base = baseUrlEl.value.trim().replace(/\/$/, '');
    if (!base) throw new Error('Enter a base URL for the custom provider.');
    url = `${base}/chat/completions`;
  } else {
    url = 'https://api.openai.com/v1/chat/completions';
  }

  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${key}`,
      ...(provider === 'openrouter' ? { 'HTTP-Referer': location.href, 'X-Title': 'Strudel AI' } : {}),
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages],
      temperature: 0.85,
      max_tokens: 1800,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.choices[0].message.content;
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const text = userInputEl.value.trim();
  if (!text || state.loading) return;

  state.loading = true;
  sendBtnEl.disabled = true;
  userInputEl.value = '';
  userInputEl.style.height = 'auto';

  // Add to history and render
  state.history.push({ role: 'user', content: text });
  renderMessage('user', text, null);

  const thinkingEl = renderThinking();

  try {
    const reply = await callLLM(state.history);
    thinkingEl.remove();


    state.history.push({ role: 'assistant', content: reply });

    const code = extractCode(reply);
    renderMessage('assistant', reply, code);

    // Auto-apply if code was generated
    if (code) applyToStrudel(code);

  } catch (err) {
    thinkingEl.remove();
    const msg = err instanceof TypeError && err.message.includes('fetch')
      ? 'Network error — likely a CORS issue. Open this file via a local server (e.g. "python3 -m http.server 8080") rather than directly from disk, then visit http://localhost:8080.'
      : err.message;
    renderError(msg);
  } finally {
    state.loading = false;
    sendBtnEl.disabled = false;
    userInputEl.focus();
  }
}

// ── Input handling ─────────────────────────────────────────────────────────
userInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
userInputEl.addEventListener('input', () => {
  userInputEl.style.height = 'auto';
  userInputEl.style.height = Math.min(userInputEl.scrollHeight, 160) + 'px';
});

// ── Example prompts ────────────────────────────────────────────────────────
function fillPrompt(btn) {
  userInputEl.value = btn.textContent;
  userInputEl.focus();
  userInputEl.dispatchEvent(new Event('input'));
}

// ── Init ───────────────────────────────────────────────────────────────────
loadSettings();
userInputEl.focus();
</script>
